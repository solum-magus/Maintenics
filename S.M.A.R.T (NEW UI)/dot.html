<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART</title>
    <link href="Style/style4.css" rel="stylesheet">
</head>
<body>

<header class="sticky-header">
    <div class="header-container">
        <div class="logos">
            <!-- Dots Icon, when clicked will show/hide sidebar -->
            <img src="Assets/dots.png" class="logo" alt="Dots" id="Dots">
            <img src="Assets/home.png" class="logo" alt="Home" id="Home">
            <img src="Assets/history.png" class="logo" alt="History" id="History">
            <a href="Assets/history.html"> </a>
            <img src="Assets/notif.png" class="logo" alt="Notifications" id="Notifications">
            <img src="Assets/settings.png" class="logo" alt="Settings" id="Settings">
        </div>

        <div class="user-info">
            <div class="user-top">
                <span class="username">Leiby Rose M.</span>
                <span class="position">Student</span>
                <select class="dropdown">
                    <option value="">Profile</option>
                    <option value="settings">Settings</option>
                    <option value="logout">Logout</option>
                </select>
            </div>
        </div>
    </div>
</header>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="logo-section">
        <img src="Assets/logo.png" alt="Company Logo" class="logo">
        <div class="company-name">
            <h2>Maintenics</h2>
            <h3>Smart</h3>
        </div>
    </div>
    <div class="separator"></div>
    <div class="company-info">
        <div class="vision">
            <h4>Vision</h4>
            <p>To be the leading provider of innovative maintenance solutions.</p>
        </div>
        <div class="mission">
            <h4>Mission</h4>
            <p>Deliver reliable, sustainable, and effective solutions for our clients.</p>
        </div>
        <div class="color-value">
            <h4>Color Value</h4>
            <p>#00FF00</p> <!-- Replace with your actual color code -->
        </div>
    </div>
</div>

<div class="content">
    <h1>Welcome to Maintenics Smart!</h1>
    <p>Click the button to open/close the sidebar.</p>
</div>

<script src="script4.js"></script>
</body>
</html>
