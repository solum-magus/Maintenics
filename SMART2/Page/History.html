<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART</title>
    <link href="../Style/History.css" rel="stylesheet">
    <link href="../Style/Sidebar.css" rel="stylesheet">

</head>
<body>

<header class="sticky-header">
    <div class="header-container">
        <div class="logos">
            <!-- Dots Icon, when clicked will show/hide sidebar -->

            <img src="../Assets/dots.svg" class="logo" alt="Dots" id="Dots">
            <a href="Home.html"><img src="../Assets/home.svg" class="logo" alt="Home" id="Home"></a>
            <a href="History.html"><img src="../Assets/history.svg" class="logo" alt="History" id="History"></a>
            <a href="Notification.html"><img src="../Assets/notification.svg" class="logo" alt="Notifications" id="Notifications"></a>
            <a href="Settings.html"><img src="../Assets/settings.svg" class="logo" alt="Settings" id="Settings"></a>
        </div>

        <div class="user-info">
            <div class="user-top">
                <span class="username">Leiby Rose M.</span>
                <span class="position">Student</span>
                <select class="dropdown">
                    <option value="">Profile</option>
                    <option value="settings">Settings</option>
                    <option value="logout">Logout</option>
                </select>
            </div>
        </div>
    </div>
</header>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="logo-section">
        <img src="../Assets/companyl.svg" alt="Company Logo" class="logo">
        <div class="company-name">
            <h2>Maintenics</h2>
            <h3>Smart</h3>
        </div>
    </div>
    <div class="separator"></div>
    <div class="company-info">
        <div class="vision">
            <h4>Vision</h4>
            <p>To be the leading provider of innovative maintenance solutions.</p>
        </div>
        <div class="mission">
            <h4>Mission</h4>
            <p>Deliver reliable, sustainable, and effective solutions for our clients.</p>
        </div>
        <div class="color-value">
            <h4>Color Value</h4>
            <p>#00FF00</p> <!-- Replace with your actual color code -->
        </div>
    </div>
</div>

<h1>Report History</h1>

<div class="filters">
    <label for="problem">Filter by Problem:</label>
    <select id="problem">
        <option value="">Select Problem</option>
        <option value="TV">TV</option>
        <option value="Broken Chair">Broken Chair</option>
        <option value="No Wi-Fi">No Wi-Fi</option>
    </select>

    <label for="date">Filter by Date:</label>
    <input type="date" id="date">
</div>

<div class="box">
    <span class="overlayt" id="status-text">Status: Resolved</span>
    <div class="rating">
        <span class="star" data-value="1">&#9733;</span>
        <span class="star" data-value="2">&#9733;</span>
        <span class="star" data-value="3">&#9733;</span>
        <span class="star" data-value="4">&#9733;</span>
        <span class="star" data-value="5">&#9733;</span>
    </div>
</div>

<script src="../JS/script1.js"></script>
<script src="../JS/script4.js"></script>

</body>
</html>
