<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART</title>
    <link href="Style/style1.css" rel="stylesheet">
</head>
<body>

<header class="sticky-header">
    <div class="header-container">
        <div class="logos">
            <!-- Dots Icon, when clicked will show/hide sidebar -->
             
            <img src="Assets/dots.png" class="logo" alt="Dots" id="Dots">
            <a href="dot.html"><img src="Assets/home.png" class="logo" alt="Home" id="Home"></a>
            <a href="history.html"><img src="Assets/history.png" class="logo" alt="History" id="History"></a>
            <a href="notif.html"><img src="Assets/notif.png" class="logo" alt="Notifications" id="Notifications"></a>
            <a href="settings.html"><img src="Assets/settings.png" class="logo" alt="Settings" id="Settings"></a>
        </div>

        <div class="user-info">
            <div class="user-top">
                <span class="username">Leiby Rose M.</span>
                <select class="dropdown">
                    <option value="">Profile</option>
                    <option value="settings">Settings</option>
                    <option value="logout">Logout</option>
                </select>
            </div>
        </div>
    </div>
</header>

<h1>Report History</h1>

<div class="filters">
    <label for="problem">Filter by Problem:</label>
    <select id="problem">
        <option value="">Select Problem</option>
        <option value="TV">TV</option>
        <option value="Broken Chair">Broken Chair</option>
        <option value="No Wi-Fi">No Wi-Fi</option>
    </select>

    <label for="date">Filter by Date:</label>
    <input type="date" id="date">
</div>

<div class="box">
    <span class="overlayt" id="status-text">Status: Resolved</span>
    <div class="rating">
        <span class="star" data-value="1">&#9733;</span>
        <span class="star" data-value="2">&#9733;</span>
        <span class="star" data-value="3">&#9733;</span>
        <span class="star" data-value="4">&#9733;</span>
        <span class="star" data-value="5">&#9733;</span>
    </div>
</div>

<script src="Javascript/script1.js"></script>

</body>
</html>
